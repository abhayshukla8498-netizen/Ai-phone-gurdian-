name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Find and Build Android Project
      run: |
        # Yeh command automatic check karega ki gradlew file kis folder mein hai
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "gradlew not found, generating a fresh wrapper in the root..."
          gradle wrapper
          GRADLEW_PATH="./gradlew"
        fi
        
        PROJECT_DIR=$(dirname "$GRADLEW_PATH")
        echo "Android project found in directory: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyAndroidApp-APK
        path: |
          **/build/outputs/apk/debug/*.apk
          
