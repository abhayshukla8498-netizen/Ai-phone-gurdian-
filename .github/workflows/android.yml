name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Deep Search and Build Android
      run: |
        # Pure project mein settings.gradle dhoondho
        SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" -print -quit)
        
        if [ -z "$SETTINGS_PATH" ]; then
          echo "ERROR: Yeh Android project nahi hai! Isme gradle files missing hain."
          exit 1
        fi
        
        PROJECT_DIR=$(dirname "$SETTINGS_PATH")
        echo "Android project located at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # Gradle wrapper generate aur build karo
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyAndroidApp-APK
        path: |
          **/build/outputs/apk/debug/*.apk
          
          
